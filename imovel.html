<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;color:#1E3A5F;min-height:100vh}
nav{background:#1E3A5F;display:flex;align-items:center;gap:12px;padding:10px 16px;position:sticky;top:0;z-index:100}
nav img{height:38px;border-radius:50%}
nav .btn-voltar{background:#3B9BD6;color:#fff;border:none;border-radius:6px;padding:7px 14px;cursor:pointer;font-size:14px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
nav .btn-wpp{background:#25D366;color:#fff;border:none;border-radius:6px;padding:7px 14px;cursor:pointer;font-size:14px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:6px;margin-left:auto}
#estado{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center}
#estado .spinner{width:48px;height:48px;border:4px solid #e0e8f0;border-top-color:#3B9BD6;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
#conteudo{display:none}
.galeria-wrap{background:#000;position:relative}
.galeria-principal{width:100%;max-height:480px;object-fit:cover;display:block;cursor:zoom-in}
.galeria-strip{display:flex;gap:6px;padding:8px;background:#111;overflow-x:auto;scrollbar-width:thin}
.galeria-strip img{height:64px;width:96px;object-fit:cover;border-radius:4px;cursor:pointer;opacity:0.65;flex-shrink:0;transition:opacity .2s}
.galeria-strip img.ativa{opacity:1;outline:2px solid #3B9BD6}
.seta-galeria{position:absolute;top:50%;transform:translateY(-50%);z-index:10;background:rgba(30,58,95,.85);border:none;color:#fff;font-size:36px;font-weight:900;width:52px;height:76px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.seta-galeria:hover{background:#1E3A5F}
.seta-esq{left:0;border-radius:0 8px 8px 0}
.seta-dir{right:0;border-radius:8px 0 0 8px}
#fs{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:9999;align-items:center;justify-content:center;flex-direction:column}
#fs.aberto{display:flex}
#fs img{max-width:95vw;max-height:85vh;object-fit:contain}
#fs .fs-close{position:absolute;top:14px;right:18px;font-size:28px;color:#fff;cursor:pointer;background:rgba(255,255,255,.15);border:none;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}
#fs .fs-nav{position:absolute;top:50%;transform:translateY(-50%);font-size:40px;color:#fff;cursor:pointer;background:rgba(0,0,0,.4);border:none;padding:8px 18px;border-radius:8px}
#fs .fs-prev{left:8px}
#fs .fs-next{right:8px}
#fs .fs-cnt{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.55);font-size:13px}
.corpo{max-width:860px;margin:0 auto;padding:20px 16px 60px}
.titulo-imovel{font-size:clamp(20px,4vw,28px);font-weight:700;color:#1E3A5F;margin-bottom:6px}
.codigo-badge{display:inline-block;background:#3B9BD6;color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:10px;letter-spacing:.5px}
.preco{font-size:clamp(22px,4vw,30px);font-weight:800;color:#1E3A5F;margin-bottom:4px}
.preco small{font-size:13px;font-weight:400;color:#666}
.localizacao{font-size:14px;color:#555;margin-bottom:16px;display:flex;align-items:center;gap:5px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.chip{background:#e8f4fb;color:#1E3A5F;border-radius:20px;padding:5px 12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:5px}
.secao{margin-bottom:24px}
.secao h3{font-size:15px;font-weight:700;color:#1E3A5F;border-bottom:2px solid #3B9BD6;padding-bottom:6px;margin-bottom:12px}
.secao p{font-size:15px;line-height:1.7;color:#333;white-space:pre-wrap}
.comods{display:flex;flex-wrap:wrap;gap:8px}
.comod{background:#fff;border:1px solid #d0e4f0;border-radius:8px;padding:6px 12px;font-size:13px;color:#1E3A5F}
.video-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:10px}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%}
.btn-wpp-fixo{position:fixed;bottom:20px;right:20px;background:#25D366;color:#fff;border:none;border-radius:50px;padding:13px 22px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(37,211,102,.5);z-index:200;display:flex;align-items:center;gap:8px;text-decoration:none}
footer{background:#1E3A5F;color:#fff;text-align:center;padding:16px;font-size:12px;line-height:1.7}
footer a{color:#3B9BD6;text-decoration:none}
</style>

<script>
var _DBURL='https://fcosta-31125-default-rtdb.firebaseio.com';
var _NODE='fcosta_imoveis';
var _fotos=[],_fotoIdx=0;

function mostrarFoto(idx){
  if(!_fotos.length)return;
  _fotoIdx=(idx+_fotos.length)%_fotos.length;
  document.getElementById('foto-principal').src=_fotos[_fotoIdx];
  document.querySelectorAll('#galeria-strip img').forEach(function(el,i){
    el.classList.toggle('ativa',i===_fotoIdx);
    if(i===_fotoIdx)el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  });
}
function abrirFs(idx){
  if(!_fotos.length)return;
  _fotoIdx=idx;
  document.getElementById('fs-img').src=_fotos[_fotoIdx];
  document.getElementById('fs-cnt').textContent=(_fotoIdx+1)+' / '+_fotos.length;
  document.getElementById('fs').classList.add('aberto');
}
function fecharFs(){document.getElementById('fs').classList.remove('aberto');}
function fsNav(dir){
  _fotoIdx=(_fotoIdx+dir+_fotos.length)%_fotos.length;
  document.getElementById('fs-img').src=_fotos[_fotoIdx];
  document.getElementById('fs-cnt').textContent=(_fotoIdx+1)+' / '+_fotos.length;
}
function fmtPreco(v,status){
  if(!v)return'';
  var n;
  if(typeof v==='number'){n=v;}
  else{
    var s=String(v).trim();
    if(/^\d{1,3}(\.\d{3})+(,\d+)?$/.test(s)){n=parseFloat(s.replace(/\./g,'').replace(',','.'));}
    else if(/^\d{1,3}(,\d{3})+(\.\d+)?$/.test(s)){n=parseFloat(s.replace(/,/g,''));}
    else{n=parseFloat(s.replace(',','.').replace(/[^\d.]/g,''));}
  }
  if(!n||isNaN(n))return'';
  var fmt=n.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
  return fmt+(status==='aluguel'?'<small> /mês</small>':'');
}
function ytEmbed(url){
  if(!url)return'';
  var id='';
  try{var u=new URL(url);if(u.hostname.includes('youtu.be'))id=u.pathname.slice(1);else id=u.searchParams.get('v')||'';}catch(e){}
  if(!id){var m=url.match(/(?:v=|youtu\.be\/)([\w-]{11})/);if(m)id=m[1];}
  return id?'<iframe src="https://www.youtube.com/embed/'+id+'" frameborder="0" allowfullscreen></iframe>':'';
}
function getParam(nome){
  var sp=new URLSearchParams(window.location.search);
  if(sp.has(nome))return sp.get(nome);
  try{var spT=new URLSearchParams(window.top.location.search);if(spT.has(nome))return spT.get(nome);}catch(e){}
  try{if(nome==='id'){var ls=localStorage.getItem('fcosta_imovel_id');if(ls)return ls;}}catch(e){}
  return null;
}
function getPathname(){try{return window.top.location.pathname;}catch(e){}return window.location.pathname;}
function norm(s){return String(s||'').toLowerCase().replace(/[-_\s]/g,'');}

function renderImovel(data,fbKey){
  var titulo=data.titulo||data.nome||'Imóvel FCosta';
  var codigo=data.codigo||data.code||fbKey||'';
  var tipo=data.tipo||'';
  var status=data.status||'';
  var preco=data.preco||data.price||data.valor||'';
  var area=data.area||'';
  var quartos=data.quartos||data.dorms||'';
  var banheiros=data.banheiros||'';
  var vagas=data.vagas||'';
  var bairro=data.bairro||'';
  var cidade=data.cidade||'São Paulo';
  var endereco=data.endereco||'';
  var descricao=data.descricao||data.description||'';
  var video=data.video||data.videoUrl||'';
  var comodidades=data.comodidades||data.amenities||[];
  var fotosRaw=data.fotos||data.photos||data.images||[];
  var wppMsg=data.wppMsg||'';

  document.getElementById('page-title').textContent=data.seoTitulo||(titulo+' — FCosta');
  document.getElementById('page-desc').setAttribute('content',data.seoDescricao||descricao.slice(0,160));

  var btnV=document.getElementById('btn-voltar');
  if(status==='aluguel'){btnV.textContent='← Alugar';btnV.onclick=function(){voltarLista('alugar');return false;};}
  else if(status==='lancamento'||codigo.startsWith('FCL')){btnV.textContent='← Lançamentos';btnV.onclick=function(){voltarLista('lancamentos');return false;};}
  else if(status==='panfleto'||codigo.startsWith('FCP')){btnV.textContent='← Panfletos';btnV.onclick=function(){voltarLista('panfletos');return false;};}
  else{btnV.textContent='← Comprar';btnV.onclick=function(){voltarLista('comprar');return false;};}

  var tel='5511993509109';
  var msg=wppMsg||('Olá! Vi o imóvel '+titulo+' ('+codigo+') no site FCosta e gostaria de mais informações.');
  var wppLink='https://wa.me/'+tel+'?text='+encodeURIComponent(msg);
  document.getElementById('btn-wpp-nav').href=wppLink;
  document.getElementById('btn-wpp-fixo').href=wppLink;

  _fotos=[];
  function pushFoto(f){if(typeof f==='string'&&f)_fotos.push(f);else if(f&&f.url)_fotos.push(f.url);}
  if(Array.isArray(fotosRaw))fotosRaw.forEach(pushFoto);
  else if(fotosRaw&&typeof fotosRaw==='object')Object.values(fotosRaw).forEach(pushFoto);
  if(data.fotoDestaque&&_fotos.indexOf(data.fotoDestaque)!==0){
    _fotos=_fotos.filter(function(f){return f!==data.fotoDestaque;});
    _fotos.unshift(data.fotoDestaque);
  }

  var fp=document.getElementById('foto-principal');
  var strip=document.getElementById('galeria-strip');
  if(_fotos.length){
    fp.src=_fotos[0];
    strip.innerHTML=_fotos.map(function(f,i){return'<img src="'+f+'" class="'+(i===0?'ativa':'')+'" onclick="mostrarFoto('+i+')" loading="lazy" alt="foto '+(i+1)+'">';}).join('');
    if(_fotos.length<=1)strip.style.display='none';
    if(_fotos.length>1){document.getElementById('seta-esq').style.display='flex';document.getElementById('seta-dir').style.display='flex';}
  }else{fp.src='https://placehold.co/800x480/1E3A5F/ffffff?text=Sem+fotos';strip.style.display='none';fp.style.cursor='default';}

  document.getElementById('det-codigo').textContent=codigo;
  document.getElementById('det-titulo').textContent=titulo;
  document.getElementById('det-preco').innerHTML=fmtPreco(preco,status);

  var loc=[bairro,cidade].filter(Boolean).join(', ');
  document.getElementById('det-local-txt').textContent=loc;
  if(!loc)document.getElementById('det-local').style.display='none';

  var chips=document.getElementById('det-chips');chips.innerHTML='';
  function addChip(ic,val,suf){if(!val&&val!==0)return;var d=document.createElement('span');d.className='chip';d.textContent=ic+' '+val+(suf||'');chips.appendChild(d);}
  if(tipo)addChip('🏠',tipo);
  if(area)addChip('📐',area,' m²');
  if(quartos)addChip('🛏',quartos,quartos==1?' quarto':' quartos');
  if(banheiros)addChip('🚿',banheiros,banheiros==1?' banheiro':' banheiros');
  if(vagas)addChip('🚗',vagas,vagas==1?' vaga':' vagas');

  if(descricao){document.getElementById('det-desc').textContent=descricao;document.getElementById('sec-desc').style.display='';}

  var comList=[];
  if(Array.isArray(comodidades))comList=comodidades.filter(Boolean);
  else if(comodidades&&typeof comodidades==='object')comList=Object.values(comodidades).filter(Boolean);
  else if(typeof comodidades==='string')comList=comodidades.split(',').map(function(s){return s.trim();}).filter(Boolean);
  if(comList.length){document.getElementById('det-comods').innerHTML=comList.map(function(c){return'<span class="comod">'+c+'</span>';}).join('');document.getElementById('sec-comods').style.display='';}

  if(video){var emb=ytEmbed(video);if(emb){document.getElementById('det-video').innerHTML=emb;document.getElementById('sec-video').style.display='';}}
  if(endereco){document.getElementById('det-endereco').textContent=endereco;document.getElementById('sec-endereco').style.display='';}

  try{localStorage.removeItem('fcosta_imovel_id');}catch(e){}
  document.getElementById('estado').style.display='none';
  document.getElementById('conteudo').style.display='block';
}

function mostrarErro(msg,sub){
  document.getElementById('estado').innerHTML='<p style="font-size:18px;color:#c0392b;font-weight:600">😕 '+msg+'</p>'
    +'<p style="font-size:14px;color:#666;margin-top:8px">'+(sub||'')+'</p><br>'
    +'<a href="#" onclick="voltarLista(\'comprar\');return false;" style="color:#3B9BD6;font-size:14px">← Voltar para listagem</a>';
}

function voltarLista(tipo){
  var urls={comprar:'https://fcostacorretor.com/comprar',alugar:'https://fcostacorretor.com/alugar',lancamentos:'https://fcostacorretor.com/lancamentos',panfletos:'https://fcostacorretor.com/panfletos'};
  var url=urls[tipo]||urls.comprar;
  try{window.top.location.href=url;}catch(e){window.location.href=url;}
}

async function buscarImovel(){
  var idParam=getParam('id');
  var codigoParam=getParam('codigo');
  var slugParam=getParam('slug');

  /* 1. Busca direta pela Firebase key */
  if(idParam&&(idParam.startsWith('-')||idParam.length>15)){
    try{
      var r0=await fetch(_DBURL+'/'+_NODE+'/'+idParam+'.json');
      var d0=await r0.json();
      if(d0&&!d0.error&&d0.titulo){renderImovel(d0,idParam);return;}
    }catch(e){}
  }

  /* 2. Varredura completa */
  try{
    var r=await fetch(_DBURL+'/'+_NODE+'.json');
    var todos=await r.json();
    if(!todos||todos.error){mostrarErro('Erro ao carregar dados.',todos?JSON.stringify(todos.error):'');return;}

    var encontrado=null,fbKey=null;
    for(var key in todos){
      var val=todos[key];
      var cod=norm(val.codigo||val.code||'');
      var sl=norm(val.slug||val.seoSlug||'');
      if(idParam){var idN=norm(idParam);if(key===idParam||cod===idN||sl===idN){encontrado=val;fbKey=key;break;}}
      if(codigoParam){var codN=norm(codigoParam);if(cod===codN||key===codigoParam){encontrado=val;fbKey=key;break;}}
      if(slugParam){var slN=norm(slugParam);if(sl===slN){encontrado=val;fbKey=key;break;}}
    }

    /* 3. Fallback pelo pathname */
    if(!encontrado){
      var path=norm(getPathname().replace(/^\//,''));
      for(var key2 in todos){
        var val2=todos[key2];
        var sl2=norm(val2.slug||val2.seoSlug||'');
        var cod2=norm(val2.codigo||'');
        if(sl2&&path.includes(sl2)){encontrado=val2;fbKey=key2;break;}
        if(cod2&&path.includes(cod2)){encontrado=val2;fbKey=key2;break;}
      }
    }

    if(encontrado)renderImovel(encontrado,fbKey);
    else mostrarErro('Imóvel não encontrado.','id="'+(idParam||'')+'" codigo="'+(codigoParam||'')+'"');
  }catch(e){mostrarErro('Erro ao carregar dados.',e.message);}
}

document.addEventListener('keydown',function(e){
  if(!document.getElementById('fs').classList.contains('aberto'))return;
  if(e.key==='Escape')fecharFs();
  if(e.key==='ArrowLeft')fsNav(-1);
  if(e.key==='ArrowRight')fsNav(1);
});

buscarImovel();
</script>
